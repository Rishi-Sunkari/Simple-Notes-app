<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F0E8;
      --surface: #FDFAF4;
      --ink: #1A1208;
      --muted: #7A6E5F;
      --accent: #C8502A;
      --accent-light: #F2E0D8;
      --border: #E0D8CC;
      --highlight: #FFD97D;
      --shadow: 0 2px 12px rgba(26,18,8,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    header {
      background: var(--ink);
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--bg);
      letter-spacing: 0.02em;
    }

    header h1 span {
      color: var(--accent);
    }

    .header-count {
      font-size: 0.8rem;
      color: #9A8E7E;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 40px;
    }

    .search-wrap svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 16px 20px 16px 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-light);
    }

    #searchInput::placeholder { color: var(--muted); font-weight: 300; }

    .add-section {
      background: var(--surface);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 40px;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
    }

    .add-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      margin-bottom: 16px;
      color: var(--muted);
      font-weight: 500;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-row input,
    .form-row textarea {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    .form-row input:focus,
    .form-row textarea:focus {
      border-color: var(--accent);
    }

    .form-row textarea { height: 90px; }

    .btn-add {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border: none;
      padding: 13px 28px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-add:hover { background: #A83E1F; }
    .btn-add:active { transform: scale(0.97); }

    .notes-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .notes-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
    }

    .badge {
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
    }

    #notesList {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .note-card {
      background: var(--surface);
      border-radius: 14px;
      padding: 22px;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      cursor: default;
      transition: transform 0.15s, box-shadow 0.15s;
      animation: fadeIn 0.3s ease both;
    }

    .note-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(26,18,8,0.12);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .note-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .note-content {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 16px;
    }

    .note-date {
      font-size: 0.72rem;
      color: #B0A090;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    mark {
      background: var(--highlight);
      color: var(--ink);
      border-radius: 3px;
      padding: 0 2px;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty svg { margin-bottom: 16px; opacity: 0.4; }
    .empty p { font-size: 0.95rem; font-weight: 300; }

    #toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--ink);
      color: var(--bg);
      padding: 14px 22px;
      border-radius: 10px;
      font-size: 0.88rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 200;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>Note<span>.</span></h1>
  <span class="header-count" id="headerCount">0 notes</span>
</header>

<main>

  <div class="search-wrap">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search notes…" autocomplete="off"/>
  </div>

  <div class="add-section">
    <h2>New note</h2>
    <div class="form-row">
      <input type="text" id="noteTitle" placeholder="Title"/>
      <textarea id="noteContent" placeholder="Start writing…"></textarea>
      <button class="btn-add" onclick="addNote()">Add Note</button>
    </div>
  </div>

  <div class="notes-header">
    <h2>Notes</h2>
    <span class="badge" id="resultBadge">0</span>
  </div>
  <div id="notesList"></div>

</main>

<div id="toast"></div>

<script>
  // ✅ ONLY CHANGE HERE
  const API = 'https://rnotes-backend-c86c.onrender.com';

  let allNotes = [];

  async function fetchNotes() {
    try {
      const res = await fetch(`${API}/notes`);
      allNotes = await res.json();
      renderNotes(allNotes);
    } catch {
      renderFallback();
    }
  }

  function renderFallback() {
    allNotes = [
      { id: '1', title: 'Meeting notes', content: 'Discussed Q2 roadmap and upcoming product milestones.', created_at: new Date().toISOString() },
      { id: '2', title: 'Grocery list', content: 'Milk, eggs, bread, butter, apples, coffee, and pasta.', created_at: new Date().toISOString() },
      { id: '3', title: 'Project ideas', content: 'Build a habit tracker app. Create a recipe manager. Design a budget planner.', created_at: new Date().toISOString() }
    ];
    renderNotes(allNotes);
  }

  async function addNote() {
    const title = document.getElementById('noteTitle').value.trim();
    const content = document.getElementById('noteContent').value.trim();
    if (!title || !content) { showToast('Please fill in both fields.'); return; }

    try {
      const res = await fetch(`${API}/notes`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content })
      });
      const saved = await res.json();
      allNotes.unshift(saved);
    } catch {
      const note = { id: Date.now().toString(), title, content, created_at: new Date().toISOString() };
      allNotes.unshift(note);
    }

    document.getElementById('noteTitle').value = '';
    document.getElementById('noteContent').value = '';
    const q = document.getElementById('searchInput').value;
    renderNotes(filterNotes(q));
    showToast('Note added ✓');
  }

  function filterNotes(query) {
    if (!query) return allNotes;
    const q = query.toLowerCase();
    return allNotes.filter(n =>
      n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q)
    );
  }

  function highlight(text, query) {
    if (!query) return escHtml(text);
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escHtml(text).replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderNotes(notes) {
    const q = document.getElementById('searchInput').value;
    const list = document.getElementById('notesList');
    document.getElementById('resultBadge').textContent = notes.length;
    document.getElementById('headerCount').textContent = `${allNotes.length} note${allNotes.length !== 1 ? 's' : ''}`;

    if (!notes.length) {
      list.innerHTML = `
        <div class="empty" style="grid-column:1/-1">
          <p>${q ? 'No notes match your search.' : 'No notes yet. Add one above!'}</p>
        </div>`;
      return;
    }

    list.innerHTML = notes.map(n => `
      <div class="note-card">
        <div class="note-title">${highlight(n.title, q)}</div>
        <div class="note-content">${highlight(n.content, q)}</div>
        <div class="note-date">${new Date(n.created_at).toLocaleDateString()}</div>
      </div>
    `).join('');
  }

  let debounceTimer;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      renderNotes(filterNotes(e.target.value));
    }, 150);
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  fetchNotes();
</script>
</body>
</html>
